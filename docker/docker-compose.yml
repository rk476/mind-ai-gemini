version: '3.8'

services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: mongodb://mongo:27017/browser_agent
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      API_SECRET: ${API_SECRET:-change-me-to-a-random-secret}
      AI_API_KEY: ${AI_API_KEY}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_MODEL: ${AI_MODEL:-gpt-4o}
      PLAYWRIGHT_HEADLESS: 'true'
    volumes:
      - images:/app/images
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ['npm', 'start']
    deploy:
      resources:
        limits:
          memory: 2G

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: mongodb://mongo:27017/browser_agent
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      API_SECRET: ${API_SECRET:-change-me-to-a-random-secret}
      AI_API_KEY: ${AI_API_KEY}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_MODEL: ${AI_MODEL:-gpt-4o}
      PLAYWRIGHT_HEADLESS: 'true'
    volumes:
      - images:/app/images
      - videos:/app/videos
      - reports:/app/reports
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ['node', '--import', 'tsx', 'worker/worker.ts']
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  mongodata:
  images:
  videos:
  reports:
