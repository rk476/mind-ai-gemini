steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/hyrgpt-browser-agent/browser-agent/mind-agent:latest', '.']

  # 2. Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/hyrgpt-browser-agent/browser-agent/mind-agent:latest']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mind-ai'
      - '--image'
      - 'us-central1-docker.pkg.dev/hyrgpt-browser-agent/browser-agent/mind-agent:latest'
      - '--region'
      - 'us-central1'
      - '--port'
      - '3000'
      - '--platform'
      - 'managed'

  # 4. AUTOMATION: Make the service public (Allow Unauthenticated)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'add-iam-policy-binding'
      - 'mind-ai'
      - '--member=allUsers'
      - '--role=roles/run.invoker'
      - '--region=us-central1'

images:
  - 'us-central1-docker.pkg.dev/hyrgpt-browser-agent/browser-agent/mind-agent:latest'

options:
  logging: CLOUD_LOGGING_ONLY